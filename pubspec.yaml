name: rupee_track
description: "Vizwallet — premium personal finance tracker."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State & architecture
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  flutter_hooks: ^0.21.2
  hooks_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Database
  drift: ^2.26.0
  sqlite3_flutter_libs: ^0.5.32
  path_provider: ^2.1.5
  path: ^1.9.1

  # Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # UI & charts
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  intl: ^0.20.2
  # Storage & utilities
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  collection: ^1.19.1
  permission_handler: ^11.4.0
  speech_to_text: ^7.0.0
  pdf: ^3.11.3
  printing: ^5.14.2
  share_plus: ^10.1.4
  supabase_flutter: ^2.15.0
  home_widget: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  drift_dev: ^2.26.0
  freezed: ^3.0.6
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1A2F5C"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  remove_alpha_ios: true
